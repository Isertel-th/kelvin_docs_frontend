<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión Documental Isertel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .error-message { color: red; text-align: center; margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Isertel Docs</h2>
    <form id="loginForm" onsubmit="login(event)">
        <input type="text" id="username" placeholder="Usuario" required autocomplete="username">
        <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
        <button type="submit">Iniciar Sesión</button>
    </form>
    <div id="mensaje" class="error-message"></div>
</div>

<script>
    async function login(event) {
        event.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const mensaje = document.getElementById('mensaje');
        mensaje.innerText = "Cargando...";

        try {
            const response = await fetch('https://kelvin-th-docs-backend.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Guardamos los datos de sesión de forma segura en el navegador
                localStorage.setItem('token', data.token);
                localStorage.setItem('rol', data.rol);
                localStorage.setItem('nombre', data.nombre);
                
                // --- REDIRECCIÓN CENTRALIZADA MULTI-ROL ---
                // Todos los roles autorizados (admin, doc, kelvin) van ahora al mismo archivo HTML
                window.location.href = 'panel.html';
                
            } else {
                mensaje.innerText = data.error || "Error en los datos proporcionados";
            }
        } catch (error) {
            console.error(error);
            mensaje.innerText = "No hay conexión con el servidor de Isertel";
        }
    }
</script>
</body>
</html>
