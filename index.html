<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión Documental Isertel</title>
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            
            /* Cambiado de Circ.gif a tu nueva imagen rt.jpg cubriendo toda la pantalla */
            background-color: #05070f;
            background-image: url('rt.jpg'); 
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover; 
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            transition: background 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* Tarjeta de Login Minimalista Premium (Glassmorphism) */
        .login-card { 
            background: rgba(255, 255, 255, 0.88); 
            padding: 2rem 2.2rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); 
            width: 100%; 
            max-width: 340px; 
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
            transform: scale(1);
            z-index: 10;
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
            display: none;
        }

        h2 { 
            text-align: center; 
            color: #0f172a; 
            margin-top: 0;
            margin-bottom: 1.8rem; 
            font-size: 24px;
            font-weight: 700; 
            letter-spacing: -0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        input { 
            width: 100%; 
            padding: 11px 8px; 
            margin: 0;
            border: none;
            border-bottom: 2px solid #cbd5e1; 
            background: transparent;
            box-sizing: border-box; 
            font-size: 15px; 
            color: #1e293b;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-bottom-color: #007bff; 
        }

        input::placeholder {
            color: #94a3b8;
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            margin-top: 0.8rem; 
            transition: background 0.2s, transform 0.1s; 
            box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
        }

        button:hover { 
            background: #0056b3; 
        }

        button:active {
            transform: scale(0.98);
        }

        #mensaje { 
            color: #e11d48; 
            text-align: center; 
            margin-top: 1rem; 
            font-size: 13px; 
            min-height: 18px; 
            font-weight: 600; 
        }

        /* --- PANTALLA DE BIENVENIDA (SPLASH SCREEN) --- */
        .welcome-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100vw;
            height: 100vh;
            padding: 2rem;
            box-sizing: border-box;
        }

        .welcome-screen.active {
            display: flex;
        }

        /* Alineación simétrica de logge.png */
        .welcome-img {
            max-width: 320px; 
            width: 75%;
            height: auto;
            margin-top: 2rem;       
            margin-bottom: 1.2rem;   
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
            z-index: 2;
        }

        /* Contenedor del texto animado en Negro con contraste nítido */
        .animated-text {
            font-size: 42px; 
            font-weight: 800;
            color: #000000; 
            margin: 0;
            padding: 0;
            display: block;
            line-height: 1.4;
            z-index: 2;
            text-shadow: 
                -2px -2px 8px rgba(255, 255, 255, 0.95),  
                 2px -2px 8px rgba(255, 255, 255, 0.95),
                -2px  2px 8px rgba(255, 255, 255, 0.95),
                 2px  2px 8px rgba(255, 255, 255, 0.95);
        }

        /* Animación por palabras */
        .animated-text .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(25px);
            animation: floatUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Keyframes */
        @keyframes popIn {
            0% { transform: scale(0.4); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="login-card" id="loginCard">
    <h2>Iniciar Sesión</h2>
    <div class="input-group">
        <input type="text" id="username" placeholder="Nombre de usuario" required>
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Contraseña" required>
    </div>
    <button onclick="login()">Entrar al Sistema</button>
    <div id="mensaje"></div>
</div>

<div class="welcome-screen" id="welcomeScreen">
    <img src="logge.png" alt="Isertel Logo" class="welcome-img">
    <h1 class="animated-text" id="welcomeText"></h1>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const mensaje = document.getElementById('mensaje');
        mensaje.innerText = "Cargando...";

        try {
            const response = await fetch('https://kelvin-th-docs-backend.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('rol', data.rol);
                localStorage.setItem('nombre', data.nombre);
                
                ejecutarTransicionBienvenida();
            } else {
                mensaje.innerText = data.error || "Error en los datos";
            }
        } catch (error) {
            console.error(error);
            mensaje.innerText = "No hay conexión con el servidor";
        }
    }

    function ejecutarTransicionBienvenida() {
        const loginCard = document.getElementById('loginCard');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const welcomeText = document.getElementById('welcomeText');

        // 1. Desvanecer la tarjeta de login
        loginCard.classList.add('fade-out');

        setTimeout(() => {
            loginCard.style.display = 'none';
            
            // 2. Transición inmersiva: cambia la imagen rt.jpg por tech.gif ocupando toda la pantalla
            document.body.style.backgroundColor = '#000000';
            document.body.style.backgroundImage = "url('tech.gif')";
            document.body.style.backgroundSize = 'cover'; 
            
            // 3. Activar pantalla completa de bienvenida
            welcomeScreen.classList.add('active');

            // 4. Animación por palabras de "Somos Isertel, Bienvenido"
            const palabras = ["Somos", "Isertel,", "Bienvenido"];
            welcomeText.innerHTML = ''; 

            palabras.forEach((palabra, index) => {
                const span = document.createElement('span');
                span.classList.add('word');
                span.innerHTML = palabra + '&nbsp;'; 
                span.style.animationDelay = `${index * 0.15}s`; 
                welcomeText.appendChild(span);
            });

            // 5. Redirección automática configurada a 2 segundos exactos
            setTimeout(() => {
                window.location.href = 'panel.html';
            }, 2000);

        }, 500);
    }
</script>
</body>
</html>
