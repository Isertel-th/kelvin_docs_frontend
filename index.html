<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión Documental Isertel</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        /* Tarjeta de Login */
        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 380px; 
            transition: all 0.5s ease;
            opacity: 1;
            transform: scale(1);
        }

        /* Clase para desvanecer el login */
        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            display: none;
        }

        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #mensaje { color: #d93025; text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }

        /* --- PANTALLA DE BIENVENIDA CENTRADA --- */
        .welcome-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            max-width: 800px; /* Permite que el texto largo no se rompa en varias líneas */
            padding: 2rem;
        }

        .welcome-screen.active {
            display: flex;
        }

        /* Imagen significativamente más grande */
        .welcome-img {
            max-width: 320px; /* Aumentado de 150px a 320px */
            width: 100%;
            height: auto;
            margin-bottom: 2.5rem;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        /* Contenedor del texto animado en el centro */
        .animated-text {
            font-size: 36px; /* Letras un poco más grandes y premium */
            font-weight: 800;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            justify-content: center; /* Centra las letras horizontalmente */
            flex-wrap: wrap;
            margin: 0;
            padding: 0;
        }

        /* Animación de aparición letra por letra */
        .animated-text span {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px);
            animation: floatUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Keyframes */
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="login-card" id="loginCard">
    <h2>Iniciar Sesión</h2>
    <input type="text" id="username" placeholder="Nombre de usuario" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button onclick="login()">Entrar al Sistema</button>
    <div id="mensaje"></div>
</div>

<div class="welcome-screen" id="welcomeScreen">
    <img src="logge.png" alt="Isertel Logo" class="welcome-img">
    <h1 class="animated-text" id="welcomeText"></h1>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const mensaje = document.getElementById('mensaje');
        mensaje.innerText = "Cargando...";

        try {
            const response = await fetch('https://kelvin-th-docs-backend.onrender.com/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('rol', data.rol);
                localStorage.setItem('nombre', data.nombre);
                
                // Ejecuta el splash screen
                ejecutarTransicionBienvenida();
            } else {
                mensaje.innerText = data.error || "Error en los datos";
            }
        } catch (error) {
            console.error(error);
            mensaje.innerText = "No hay conexión con el servidor";
        }
    }

    function ejecutarTransicionBienvenida() {
        const loginCard = document.getElementById('loginCard');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const welcomeText = document.getElementById('welcomeText');

        // 1. Desvanecer login
        loginCard.classList.add('fade-out');

        setTimeout(() => {
            loginCard.style.display = 'none';
            
            // 2. Mostrar contenedor de bienvenida
            welcomeScreen.classList.add('active');

            // 3. Inyectar y animar el texto "Somos Isertel, Bienvenido" de forma centrada
            const textoCompleto = "Somos Isertel, Bienvenido";
            welcomeText.innerHTML = ''; 

            textoCompleto.split('').forEach((letra, index) => {
                const span = document.createElement('span');
                span.innerHTML = letra === ' ' ? '&nbsp;' : letra;
                // Aplica el retraso escalonado para el efecto máquina/ola de izquierda a centro a derecha
                span.style.animationDelay = `${index * 0.05}s`;
                welcomeText.appendChild(span);
            });

            // 4. Redirección tras finalizar por completo el efecto (3.5 segundos para disfrutar la animación)
            setTimeout(() => {
                window.location.href = 'panel.html';
            }, 3500);

        }, 500);
    }
</script>
</body>
</html>
