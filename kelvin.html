<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Competencias y EPP - Kelvin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .sidebar-item.active { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .folder-card:hover { transform: translateY(-5px); border-color: #4f46e5; background-color: #f5f3ff; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <i class="fas fa-user-shield text-4xl text-indigo-400 mb-2"></i>
            <h2 class="text-white font-bold text-lg">Módulo Kelvin</h2>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Seguridad e Higiene</p>
        </div>
        <nav class="flex-1 p-6 space-y-2">
            <button onclick="showTab('tab-activos', this); loadData('activos')" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition-all">
                <i class="fas fa-users mr-3"></i> <span>Personal Activo</span>
            </button>
            <button onclick="showTab('tab-pasivos', this); loadData('pasivos')" class="sidebar-item w-full flex items-center p-4 rounded-xl transition-all">
                <i class="fas fa-user-slash mr-3"></i> <span>Personal Pasivo</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full text-red-400 hover:bg-red-500/10 p-4 rounded-xl font-bold text-sm flex items-center">
                <i class="fas fa-power-off mr-3"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <div class="flex-1 p-10 overflow-y-auto">
        <div id="tab-activos" class="tab-content active">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Nómina de Personal Activo</h1>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">Colaborador</th>
                            <th class="px-6 py-4">Cédula</th>
                            <th class="px-6 py-4 text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-activos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-pasivos" class="tab-content">
            <h1 class="text-2xl font-bold text-slate-800 mb-6">Personal Pasivo (Histórico)</h1>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold border-b">
                        <tr>
                            <th class="px-6 py-4">Colaborador</th>
                            <th class="px-6 py-4">Cédula</th>
                            <th class="px-6 py-4 text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="lista-pasivos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalExpediente" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                <div>
                    <h3 class="font-bold text-slate-800" id="modalNombre">Expediente</h3>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest" id="rutaActual">Seleccione una carpeta</p>
                </div>
                <div class="flex gap-2">
                    <button id="btnVolver" onclick="mostrarCarpetasRaiz()" class="hidden bg-slate-200 text-slate-700 px-4 py-2 rounded-lg text-xs font-bold">Volver</button>
                    <button onclick="cerrarModal()" class="text-slate-400 hover:text-red-500 text-2xl">&times;</button>
                </div>
            </div>

            <div id="cuerpoModal" class="p-8 min-h-[400px]">
                </div>

            <div id="footerSubida" class="hidden p-6 bg-slate-50 border-t flex gap-4">
                <select id="tipoDocSelect" class="flex-1 p-2 border rounded-lg text-sm"></select>
                <button onclick="document.getElementById('inputArchivo').click()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold text-sm">Subir PDF</button>
            </div>
        </div>
    </div>

    <input type="file" id="inputArchivo" class="hidden" accept=".pdf">

    <script>
        const API_BASE = "https://kelvin-th-docs-backend.onrender.com/api";
        const token = localStorage.getItem('token');
        let currentUserId = null;
        let userEsPasivo = false;
        let carpetaAbierta = "";

        // Al iniciar, cargar activos
        window.onload = () => { if(!token) window.location.href='index.html'; loadData('activos'); };

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        async function loadData(tipo) {
            const url = tipo === 'activos' ? `${API_BASE}/admin/empleados` : `${API_BASE}/admin/pasivos`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                document.getElementById(`lista-${tipo}`).innerHTML = data.map(u => `
                    <tr>
                        <td class="px-6 py-4 font-semibold text-slate-700">${u.nombre_completo}</td>
                        <td class="px-6 py-4 text-slate-500">${u.cedula}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="abrirExpediente(${u.id}, '${u.nombre_completo}', ${tipo==='pasivos'})" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700">Expediente</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }

        function abrirExpediente(id, nombre, pasivo) {
            currentUserId = id;
            userEsPasivo = pasivo;
            document.getElementById('modalNombre').innerText = nombre;
            document.getElementById('modalExpediente').classList.remove('hidden');
            mostrarCarpetasRaiz();
        }

        function mostrarCarpetasRaiz() {
            carpetaAbierta = "";
            document.getElementById('btnVolver').classList.add('hidden');
            document.getElementById('footerSubida').classList.add('hidden');
            document.getElementById('rutaActual').innerText = "Directorio Principal";
            document.getElementById('cuerpoModal').innerHTML = `
                <div class="grid grid-cols-2 gap-6">
                    <div onclick="abrirCarpeta('Certificados de competencia')" class="folder-card border-2 border-dashed p-10 rounded-2xl text-center cursor-pointer transition-all">
                        <i class="fas fa-certificate text-4xl text-indigo-500 mb-3"></i>
                        <p class="font-bold text-slate-700">Certificados de competencia</p>
                    </div>
                    <div onclick="abrirCarpeta('Acta de epp')" class="folder-card border-2 border-dashed p-10 rounded-2xl text-center cursor-pointer transition-all">
                        <i class="fas fa-hard-hat text-4xl text-slate-600 mb-3"></i>
                        <p class="font-bold text-slate-700">Acta de EPP's</p>
                    </div>
                </div>
            `;
        }

        async function abrirCarpeta(nombre) {
            carpetaAbierta = nombre;
            document.getElementById('btnVolver').classList.remove('hidden');
            document.getElementById('footerSubida').classList.remove('hidden');
            document.getElementById('rutaActual').innerText = `Expediente > ${nombre}`;
            
            // Configurar opciones del select según carpeta
            const select = document.getElementById('tipoDocSelect');
            select.innerHTML = nombre === 'Certificados de competencia' 
                ? '<option>Certificado de Competencia Laboral</option><option>Certificado de Altura</option>'
                : '<option>Entrega de EPP (Ingreso)</option><option>Reposición de EPP</option>';

            await cargarArchivos();
        }

        async function cargarArchivos() {
            const cuerpo = document.getElementById('cuerpoModal');
            cuerpo.innerHTML = '<p class="text-center">Cargando documentos...</p>';
            try {
                // Usamos la nueva ruta de kelvin que creamos en el servidor
                const res = await fetch(`${API_BASE}/kelvin/documentos/${currentUserId}?pasivo=${userEsPasivo}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const docs = await res.json();
                
                // Filtrar para mostrar solo los de la carpeta abierta
                const filtro = carpetaAbierta === 'Certificados de competencia' ? 'Certificado' : 'Acta';
                const docsFiltrados = docs.filter(d => d.tipo_documento.includes(filtro));

                if(docsFiltrados.length === 0) {
                    cuerpo.innerHTML = '<p class="text-center text-slate-400 py-10">No hay archivos en esta carpeta.</p>';
                    return;
                }

                cuerpo.innerHTML = docsFiltrados.map(d => `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl mb-2">
                        <div class="flex items-center">
                            <i class="fas fa-file-pdf text-red-500 mr-3 text-lg"></i>
                            <span class="text-sm font-medium text-slate-700">${d.tipo_documento}</span>
                        </div>
                        <div class="flex gap-2">
                            <a href="${d.url_cloudinary}" target="_blank" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg"><i class="fas fa-eye"></i></a>
                            <button onclick="eliminarDoc(${d.id})" class="p-2 text-red-500 hover:bg-red-50 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (e) { cuerpo.innerHTML = 'Error al cargar'; }
        }

        document.getElementById('inputArchivo').onchange = async function() {
            const file = this.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('archivo', file);
            formData.append('usuario_id', currentUserId);
            formData.append('es_pasivo', userEsPasivo);
            formData.append('tipo_documento', `${document.getElementById('tipoDocSelect').value} - ${file.name}`);

            try {
                const res = await fetch(`${API_BASE}/kelvin/subir-certificados`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if(res.ok) await cargarArchivos();
                else alert("Error al subir");
            } catch (e) { alert("Error de red"); }
            this.value = "";
        };

        async function eliminarDoc(id) {
            if(!confirm("¿Eliminar este documento?")) return;
            await fetch(`${API_BASE}/admin/documentos/${id}`, { 
                method: 'DELETE', 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            await cargarArchivos();
        }

        function cerrarModal() { document.getElementById('modalExpediente').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
