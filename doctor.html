<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <style>
        :root { --primary: #007bff; --dark: #2c3e50; --light: #f8f9fa; --danger: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .navbar { width: 100%; background: var(--dark); color: white; padding: 1rem 2rem; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu { display: flex; gap: 20px; }
        .nav-btn { background: #34495e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .nav-btn:hover { background: var(--primary); }
        .btn-logout { background: var(--danger); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .container { width: 90%; max-width: 1200px; margin-top: 30px; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }

        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 14px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 15px; color: #444; }
        tr:hover { background-color: #f1f7ff; }
        
        .loading { text-align: center; padding: 20px; color: var(--primary); font-weight: bold; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #e3f2fd; color: #0d47a1; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: bold; font-size: 1.2rem;">Isertel - Panel Médico</div>
        <div class="nav-menu">
            <button class="nav-btn" onclick="cargarDatos('empleados')">Ver empleados activos</button>
            <button class="nav-btn" onclick="cargarDatos('pasivos')">Ver empleados pasivos</button>
        </div>
        <div>
            <span id="nombreDoctor" style="margin-right: 15px; font-size: 0.9rem; opacity: 0.8;"></span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container">
        <h2 id="tituloSeccion">Bienvenido al Sistema</h2>
        <div id="contentArea">
            <p>Seleccione una opción del menú superior para visualizar los registros.</p>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const rol = localStorage.getItem('rol');
        const nombre = localStorage.getItem('nombre');

        if (!token || rol !== 'doc') {
            window.location.href = 'index.html';
        }

        document.getElementById('nombreDoctor').innerText = "Doctora: " + nombre;

        async function cargarDatos(tipo) {
            const contentArea = document.getElementById('contentArea');
            const titulo = document.getElementById('tituloSeccion');
            
            titulo.innerText = tipo === 'empleados' ? "Nómina de Empleados Activos" : "Archivo de Empleados Pasivos";
            contentArea.innerHTML = '<div class="loading">Consultando base de datos...</div>';

            try {
                const endpoint = tipo === 'empleados' ? '/api/admin/empleados' : '/api/admin/pasivos';
                const response = await fetch(`https://kelvin-th-docs-backend.onrender.com${endpoint}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.length === 0) {
                        contentArea.innerHTML = "<p>No se encontraron registros en esta categoría.</p>";
                        return;
                    }

                    let html = `
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Cédula</th>
                                        <th>Nombre Completo</th>
                                        <th>Correo</th>
                                        <th>Celular</th>
                                        <th>Dirección</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    data.forEach(emp => {
                        // El filtrado de admin/doc ya viene del backend para 'empleados'
                        html += `
                            <tr>
                                <td><b>${emp.cedula}</b></td>
                                <td>${emp.nombre_completo}</td>
                                <td>${emp.correo || 'N/A'}</td>
                                <td>${emp.celular || 'N/A'}</td>
                                <td>${emp.direccion || 'N/A'}</td>
                                <td><span class="status-badge">${tipo === 'empleados' ? 'ACTIVO' : 'PASIVO'}</span></td>
                            </tr>
                        `;
                    });

                    html += `</tbody></table></div>`;
                    contentArea.innerHTML = html;
                } else {
                    contentArea.innerHTML = `<p style="color:red;">Error: ${data.error}</p>`;
                }
            } catch (error) {
                contentArea.innerHTML = `<p style="color:red;">No hay conexión con el servidor.</p>`;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
