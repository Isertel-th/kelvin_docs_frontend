<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --dark: #2c3e50; --light: #f8f9fa; --danger: #d93025; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .navbar { width: 100%; background: var(--dark); color: white; padding: 1rem 2rem; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-menu { display: flex; gap: 15px; }
        .nav-btn { background: #34495e; color: white; border: none; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-weight: 500; transition: 0.3s; font-size: 0.85rem; }
        .nav-btn:hover { background: var(--primary); }
        .nav-btn.active { background: var(--primary); box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .btn-logout { background: var(--danger); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        .container { width: 95%; max-width: 1200px; margin-top: 30px; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 50px; }
        h2 { color: var(--dark); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }

        /* Estilos de la tabla y badges */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f4f8; color: var(--dark); padding: 12px; text-align: left; font-size: 13px; text-transform: uppercase; border-bottom: 2px solid #dee2e6; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #444; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .bg-activo { background: #e3f2fd; color: #0d47a1; }
        .bg-pasivo { background: #fce4ec; color: #c2185b; }

        /* Estilo de Bloques por Período (Reflejo del Admin) */
        .period-block { border-left: 4px solid var(--primary); background: #fcfcfc; padding: 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.02); }
        .period-title { font-weight: 900; font-size: 12px; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; font-style: italic; }
        
        .doc-card { display: flex; justify-content: space-between; align-items: center; background: white; border: 1px solid #eee; padding: 10px 15px; border-radius: 10px; margin-bottom: 8px; transition: 0.2s; }
        .doc-card:hover { border-color: var(--primary); transform: translateX(5px); }
        .doc-info b { font-size: 12px; color: #1a202c; text-transform: uppercase; }
        .doc-info p { margin: 2px 0; font-size: 11px; color: #718096; }
        
        .btn-view { background: #eef2ff; color: #4338ca; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s; }
        .btn-view:hover { background: #4338ca; color: white; }

        .loading { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight: bold; font-size: 1.2rem;">Isertel - Panel Médico</div>
        <div class="nav-menu">
            <button class="nav-btn" id="btn-empleados" onclick="cargarNominas('empleados')">Nómina Activa</button>
            <button class="nav-btn" id="btn-pasivos" onclick="cargarNominas('pasivos')">Archivo Pasivo</button>
            <button class="nav-btn" id="btn-certificados" onclick="cargarCertificadosMedicos()" style="background: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8;">
                <i class="fas fa-notes-medical"></i> Certificados Médicos
            </button>
        </div>
        <div>
            <span id="nombreDoctor" style="margin-right: 15px; font-size: 0.9rem; opacity: 0.8;"></span>
            <button class="btn-logout" onclick="logout()">Salir</button>
        </div>
    </nav>

    <div class="container">
        <h2 id="tituloSeccion"><i class="fas fa-stethoscope"></i> Bienvenido</h2>
        <div id="contentArea">
            <p>Seleccione una opción del menú para gestionar la información médica.</p>
        </div>
    </div>

    <script>
        const API_BASE = "https://kelvin-th-docs-backend.onrender.com/api";
        const token = localStorage.getItem('token');
        const rol = localStorage.getItem('rol');
        const nombre = localStorage.getItem('nombre');

        if (!token || rol !== 'doc') { window.location.href = 'index.html'; }
        document.getElementById('nombreDoctor').innerText = "Dra. " + nombre;

        function setActiveBtn(id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function cargarNominas(tipo) {
            setActiveBtn(tipo === 'empleados' ? 'btn-empleados' : 'btn-pasivos');
            const titulo = document.getElementById('tituloSeccion');
            const area = document.getElementById('contentArea');
            
            titulo.innerHTML = tipo === 'empleados' ? `<i class="fas fa-user-check"></i> Personal Activo` : `<i class="fas fa-user-slash"></i> Archivo Pasivo`;
            area.innerHTML = '<div class="loading">Cargando nómina...</div>';

            try {
                const res = await fetch(`${API_BASE}/admin/${tipo}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();

                let html = `<div class="table-container"><table><thead><tr><th>Cédula</th><th>Nombre Completo</th><th>Celular</th><th>Dirección</th><th>Estado</th></tr></thead><tbody>`;
                data.forEach(emp => {
                    html += `<tr>
                        <td><b>${emp.cedula}</b></td>
                        <td>${emp.nombre_completo}</td>
                        <td>${emp.celular || 'N/A'}</td>
                        <td>${emp.direccion || 'N/A'}</td>
                        <td><span class="status-badge ${tipo === 'empleados' ? 'bg-activo' : 'bg-pasivo'}">${tipo.toUpperCase()}</span></td>
                    </tr>`;
                });
                area.innerHTML = html + `</tbody></table></div>`;
            } catch (e) { area.innerHTML = "Error de conexión."; }
        }

        async function cargarCertificadosMedicos() {
            setActiveBtn('btn-certificados');
            const titulo = document.getElementById('tituloSeccion');
            const area = document.getElementById('contentArea');
            
            titulo.innerHTML = `<i class="fas fa-file-medical"></i> Control de Certificados Médicos (Global)`;
            area.innerHTML = '<div class="loading">Sincronizando con expedientes del Admin...</div>';

            try {
                const res = await fetch(`${API_BASE}/doctor/todos-certificados`, { headers: { 'Authorization': `Bearer ${token}` } });
                const docs = await res.json();

                if (docs.length === 0) {
                    area.innerHTML = "<p style='text-align:center; padding:20px;'>No hay certificados médicos registrados en el sistema.</p>";
                    return;
                }

                // Agrupar por Período (Igual que en admin.html)
                const grupos = {};
                docs.forEach(d => {
                    const partes = d.tipo_documento.split(' - ');
                    const mes = partes.length > 1 ? partes[1].toUpperCase() : "SIN PERIODO";
                    if(!grupos[mes]) grupos[mes] = [];
                    grupos[mes].push(d);
                });

                const mesesOrden = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE", "SIN PERIODO"];
                const mesesPresentes = Object.keys(grupos).sort((a, b) => mesesOrden.indexOf(a) - mesesOrden.indexOf(b));

                area.innerHTML = mesesPresentes.map(mes => `
                    <div class="period-block">
                        <div class="period-title"><i class="fas fa-calendar-alt"></i> PERIODO: ${mes}</div>
                        ${grupos[mes].map(d => {
                            const partes = d.tipo_documento.split(' - ');
                            const tipoLabel = partes[0] || "Certificado";
                            const nombreOriginal = partes[2] || "Archivo";
                            const fechaSubida = new Date(d.created_at).toLocaleDateString();

                            return `
                            <div class="doc-card">
                                <div class="doc-info">
                                    <span class="status-badge ${d.estado_laboral === 'ACTIVO' ? 'bg-activo' : 'bg-pasivo'}" style="float:right">${d.estado_laboral}</span>
                                    <b>${d.nombre_user}</b>
                                    <p><i class="fas fa-file-pdf text-danger"></i> ${tipoLabel} - <span style="color:var(--dark)">${nombreOriginal}</span></p>
                                    <p style="font-size:9px">Fecha de registro: ${fechaSubida}</p>
                                </div>
                                <a href="${d.url_cloudinary}" target="_blank" class="btn-view" title="Ver Documento">
                                    <i class="fas fa-eye"></i>
                                </a>
                            </div>`;
                        }).join('')}
                    </div>
                `).join('');

            } catch (e) { area.innerHTML = "Error al obtener documentos."; }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
