<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Gestión de Expedientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #2563eb; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        tr.cursor-pointer:hover { background-color: #f8fafc; }
        .folder-card:hover { transform: scale(1.02); transition: all 0.2s; cursor: pointer; }
    </style>
</head>
<body class="flex min-h-screen bg-slate-100">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-white font-bold text-xl tracking-widest">SISTEMA MÉDICO</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="mostrarSeccion('activos')" class="sidebar-item w-full flex items-center p-3 rounded-lg transition-all hover:bg-slate-800 active" id="btn-activos">
                <i class="fas fa-user-check mr-3"></i> Empleados Activos
            </button>
            <button onclick="mostrarSeccion('pasivos')" class="sidebar-item w-full flex items-center p-3 rounded-lg transition-all hover:bg-slate-800" id="btn-pasivos">
                <i class="fas fa-user-minus mr-3"></i> Empleados Pasivos
            </button>
            <button onclick="logout()" class="w-full flex items-center p-3 rounded-lg text-red-400 hover:bg-red-900/20 mt-10">
                <i class="fas fa-sign-out-alt mr-3"></i> Cerrar Sesión
            </button>
        </nav>
    </div>

    <div class="flex-1 p-8 overflow-y-auto">
        <div id="nav-header" class="mb-6 flex items-center text-sm text-slate-500 font-medium">
            <span id="breadcrumb-root">Panel</span>
            <span id="breadcrumb-folder" class="hidden"> <i class="fas fa-chevron-right mx-2 text-[10px]"></i> <span id="nombre-empleado-nav"></span></span>
            <span id="breadcrumb-subfolder" class="hidden"> <i class="fas fa-chevron-right mx-2 text-[10px]"></i> <span id="nombre-subcarpeta-nav"></span></span>
        </div>

        <div id="seccion-lista" class="tab-content active">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                    <h2 id="titulo-lista" class="font-bold text-slate-700 uppercase tracking-wider text-sm">Cargando...</h2>
                    <input type="text" id="filtroLista" onkeyup="filtrarTabla()" placeholder="Buscar empleado..." class="px-4 py-2 border rounded-lg text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4 font-semibold">Cédula</th>
                            <th class="px-6 py-4 font-semibold">Nombre Completo</th>
                            <th class="px-6 py-4 font-semibold">Cargo</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="seccion-expediente" class="tab-content">
            <button onclick="volverALista()" class="mb-6 text-blue-600 hover:text-blue-800 flex items-center font-medium">
                <i class="fas fa-arrow-left mr-2"></i> Volver al listado
            </button>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div onclick="abrirSubcarpeta('Certificados Médicos')" class="folder-card bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                    <i class="fas fa-file-medical text-6xl text-red-500 mb-4"></i>
                    <h3 class="text-lg font-bold text-slate-800">Certificados Médicos</h3>
                    <p class="text-slate-500 text-sm">Reposos y validaciones IESS</p>
                </div>
                <div onclick="abrirSubcarpeta('Certificados de Aptitud')" class="folder-card bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center">
                    <i class="fas fa-user-md text-6xl text-blue-500 mb-4"></i>
                    <h3 class="text-lg font-bold text-slate-800">Certificados de Aptitud</h3>
                    <p class="text-slate-500 text-sm">Fichas de ingreso, periódicas y retiro</p>
                </div>
            </div>
        </div>

        <div id="seccion-documentos" class="tab-content">
            <button onclick="volverAExpediente()" class="mb-6 text-blue-600 hover:text-blue-800 flex items-center font-medium">
                <i class="fas fa-arrow-left mr-2"></i> Volver al expediente
            </button>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8">
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Nuevo Documento</label>
                        <select id="tipo_doc_input" class="w-full p-2.5 border rounded-lg text-sm bg-slate-50">
                            </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Seleccionar Archivo (PDF)</label>
                        <input type="file" id="archivo_input" accept="application/pdf" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>
                    <button onclick="subirDocumento()" class="mt-6 bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold text-sm hover:bg-blue-700 transition-all flex items-center">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> SUBIR
                    </button>
                </div>
            </div>

            <div id="contenedor-periodos" class="space-y-6">
                </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://isertel-backend.onrender.com/api"; // Cambia a tu URL
        let empleadosActuales = [];
        let empleadoSeleccionado = null;
        let subcarpetaActual = "";
        let tipoTablaActual = "activos";

        // Protección de Ruta
        (function() {
            const token = localStorage.getItem('token');
            const rol = localStorage.getItem('rol');
            if (!token || (rol !== 'doctor' && rol !== 'admin')) { window.location.href = 'index.html'; }
        })();

        // Navegación Básica
        function mostrarSeccion(tipo) {
            tipoTablaActual = tipo;
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${tipo}`).classList.add('active');
            document.getElementById('titulo-lista').innerText = `Lista de Personal ${tipo.toUpperCase()}`;
            document.getElementById('breadcrumb-root').innerText = `Personal ${tipo.charAt(0).toUpperCase() + tipo.slice(1)}`;
            volverALista();
            cargarEmpleados();
        }

        async function cargarEmpleados() {
            const token = localStorage.getItem('token');
            const endpoint = tipoTablaActual === 'activos' ? '/admin/usuarios' : '/admin/pasivos';
            const res = await fetch(`${API_BASE}${endpoint}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            empleadosActuales = await res.json();
            renderizarTabla(empleadosActuales);
        }

        function renderizarTabla(data) {
            const cuerpo = document.getElementById('tabla-cuerpo');
            cuerpo.innerHTML = data.map(emp => `
                <tr class="cursor-pointer hover:bg-blue-50 transition-colors" ondblclick="abrirExpediente(${emp.id}, '${emp.nombre}')">
                    <td class="px-6 py-4 text-sm font-medium text-slate-700">${emp.cedula || emp.id}</td>
                    <td class="px-6 py-4 text-sm text-slate-600">${emp.nombre}</td>
                    <td class="px-6 py-4 text-sm text-slate-500 italic">${emp.cargo || 'N/A'}</td>
                </tr>
            `).join('');
        }

        // Lógica de Carpetas
        function abrirExpediente(id, nombre) {
            empleadoSeleccionado = { id, nombre };
            document.getElementById('seccion-lista').classList.remove('active');
            document.getElementById('seccion-expediente').classList.add('active');
            document.getElementById('breadcrumb-folder').classList.remove('hidden');
            document.getElementById('nombre-empleado-nav').innerText = nombre;
        }

        function abrirSubcarpeta(tipo) {
            subcarpetaActual = tipo;
            document.getElementById('seccion-expediente').classList.remove('active');
            document.getElementById('seccion-documentos').classList.add('active');
            document.getElementById('breadcrumb-subfolder').classList.remove('hidden');
            document.getElementById('nombre-subcarpeta-nav').innerText = tipo;
            
            // Configurar opciones del select según subcarpeta
            const select = document.getElementById('tipo_doc_input');
            if(tipo === 'Certificados Médicos') {
                select.innerHTML = '<option value="Certificado médico">Certificado médico</option><option value="Reposo">Reposo</option>';
            } else {
                select.innerHTML = '<option value="Apto">Apto</option><option value="Apto con Restricciones">Apto con Restricciones</option><option value="No Apto">No Apto</option>';
            }
            cargarDocumentosSubcarpeta();
        }

        // Carga de Documentos con agrupación por Periodo (Lógica igual a Admin)
        async function cargarDocumentosSubcarpeta() {
            const token = localStorage.getItem('token');
            const endpoint = subcarpetaActual === 'Certificados Médicos' 
                ? `/doctor/medicos/${empleadoSeleccionado.id}` 
                : `/doctor/aptitud/${empleadoSeleccionado.id}`;

            const res = await fetch(`${API_BASE}${endpoint}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const docs = await res.json();
            
            // Agrupar por mes/año (Meses en español)
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const grupos = {};

            docs.forEach(d => {
                const fecha = new Date(d.created_at);
                const clave = `${meses[fecha.getMonth()]} ${fecha.getFullYear()}`;
                if (!grupos[clave]) grupos[clave] = [];
                grupos[clave].push(d);
            });

            const contenedor = document.getElementById('contenedor-periodos');
            contenedor.innerHTML = Object.keys(grupos).map(periodo => `
                <div class="mes-block border-l-4 border-blue-500 pl-4">
                    <h3 class="text-blue-600 font-bold text-sm mb-3 uppercase">${periodo}</h3>
                    <div class="bg-white rounded-lg border divide-y">
                        ${grupos[periodo].map(d => `
                            <div class="p-3 flex justify-between items-center text-sm">
                                <span class="font-medium text-slate-700">${d.tipo_documento}</span>
                                <div class="flex items-center gap-4">
                                    <span class="text-xs text-slate-400">${new Date(d.created_at).toLocaleDateString()}</span>
                                    <a href="${d.url_cloudinary}" target="_blank" class="text-blue-500 hover:text-blue-700"><i class="fas fa-eye"></i></a>
                                    <button onclick="eliminarDocumento(${d.id})" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('') || '<p class="text-center text-slate-400 py-10">No hay documentos en esta carpeta.</p>';
        }

        // Función de Subida
        async function subirDocumento() {
            const archivo = document.getElementById('archivo_input').files[0];
            const tipo = document.getElementById('tipo_doc_input').value;
            if(!archivo) return alert("Selecciona un archivo");

            const formData = new FormData();
            formData.append('archivo', archivo);
            formData.append('tipo_documento', tipo);
            formData.append('usuario_id', empleadoSeleccionado.id);
            formData.append('es_pasivo', tipoTablaActual === 'pasivos');

            const endpoint = subcarpetaActual === 'Certificados Médicos' ? '/doctor/subir-reposo' : '/doctor/subir-aptitud';

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: formData
                });
                if(res.ok) {
                    alert("Subido con éxito");
                    document.getElementById('archivo_input').value = "";
                    cargarDocumentosSubcarpeta();
                }
            } catch (e) { alert("Error al subir"); }
        }

        async function eliminarDocumento(id) {
            if(!confirm("¿Eliminar permanentemente?")) return;
            const endpoint = subcarpetaActual === 'Certificados Médicos' ? `/doctor/reposo/${id}` : `/doctor/aptitud/${id}`;
            await fetch(`${API_BASE}${endpoint}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            cargarDocumentosSubcarpeta();
        }

        // Control de UI
        function volverALista() {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById('seccion-lista').classList.add('active');
            document.getElementById('breadcrumb-folder').classList.add('hidden');
            document.getElementById('breadcrumb-subfolder').classList.add('hidden');
        }

        function volverAExpediente() {
            document.getElementById('seccion-documentos').classList.remove('active');
            document.getElementById('seccion-expediente').classList.add('active');
            document.getElementById('breadcrumb-subfolder').classList.add('hidden');
        }

        function filtrarTabla() {
            const busqueda = document.getElementById('filtroLista').value.toLowerCase();
            const filtrados = empleadosActuales.filter(e => e.nombre.toLowerCase().includes(busqueda) || (e.cedula && e.cedula.includes(busqueda)));
            renderizarTabla(filtrados);
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        // Carga inicial
        window.onload = () => mostrarSeccion('activos');
    </script>
</body>
</html>
