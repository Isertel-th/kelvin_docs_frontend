<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Doctor - Isertel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; justify-content: center;}
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #2c3e50; }
        .badge { background: #3498db; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        button { margin-top: 20px; padding: 10px 25px; background: #e74c3c; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hola Mundo</h1>
        <p>Bienvenido al Panel de Gestión para <strong>Doctores</strong></p>
        <p>Usuario conectado: <span class="badge" id="nombreDoctor">...</span></p>
        <button onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        // Verificación de seguridad
        const token = localStorage.getItem('token');
        const rol = localStorage.getItem('rol');
        const nombre = localStorage.getItem('nombre');

        if (!token || rol !== 'doc') {
            window.location.href = 'index.html';
        } else {
            document.getElementById('nombreDoctor').innerText = nombre;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
