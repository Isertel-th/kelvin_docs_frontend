<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .folder-card:hover { transform: scale(1.02); transition: all 0.2s; cursor: pointer; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-white text-2xl font-bold tracking-tight">ISER<span class="text-blue-500">TEL</span></h1>
            <p class="text-xs mt-2 text-slate-500 uppercase tracking-widest">Panel Médico</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="showTab('activos')" id="btn-activos" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition-all hover:bg-slate-800">
                <i class="fas fa-user-check mr-4 w-5"></i> Empleados Activos
            </button>
            <button onclick="showTab('pasivos')" id="btn-pasivos" class="sidebar-item w-full flex items-center p-4 rounded-xl transition-all hover:bg-slate-800">
                <i class="fas fa-user-minus mr-4 w-5"></i> Empleados Pasivos
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center justify-center p-3 text-red-400 hover:bg-red-500/10 rounded-lg transition-colors">
                <i class="fas fa-sign-out-alt mr-2"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <div id="seccionListas">
            <div id="activos" class="tab-content active">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-extrabold text-slate-800">Empleados Activos</h2>
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="text" id="searchActivos" onkeyup="filterTable('tableActivos', this.value)" placeholder="Buscar por nombre o cédula..." class="pl-12 pr-6 py-3 border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 w-80 bg-white">
                    </div>
                </div>
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200">
                    <table class="w-full" id="tableActivos">
                        <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm uppercase">
                            <tr>
                                <th class="px-8 py-5 text-left font-semibold">Empleado</th>
                                <th class="px-8 py-5 text-left font-semibold">Cédula</th>
                                <th class="px-8 py-5 text-left font-semibold">Cargo</th>
                            </tr>
                        </thead>
                        <tbody id="listaActivos" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>

            <div id="pasivos" class="tab-content">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-extrabold text-slate-800">Empleados Pasivos</h2>
                    <div class="relative">
                        <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                        <input type="text" id="searchPasivos" onkeyup="filterTable('tablePasivos', this.value)" placeholder="Buscar por nombre..." class="pl-12 pr-6 py-3 border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 w-80 bg-white">
                    </div>
                </div>
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200">
                    <table class="w-full" id="tablePasivos">
                        <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-sm uppercase">
                            <tr>
                                <th class="px-8 py-5 text-left font-semibold">Empleado</th>
                                <th class="px-8 py-5 text-left font-semibold">Cédula</th>
                            </tr>
                        </thead>
                        <tbody id="listaPasivos" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="seccionExpediente" class="hidden animate-fade-in">
            <button onclick="volverAListas()" class="mb-6 flex items-center text-blue-600 font-semibold hover:text-blue-800">
                <i class="fas fa-arrow-left mr-2"></i> Volver a la lista
            </button>
            <h2 id="nombreEmpleadoTitulo" class="text-3xl font-bold text-slate-800 mb-8"></h2>
            
            <div id="menuCarpetas" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div onclick="abrirSubcarpeta('Certificado Médico')" class="folder-card bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center">
                    <i class="fas fa-file-medical text-6xl text-red-500 mb-4"></i>
                    <span class="text-lg font-bold text-slate-700">Certificados Médicos</span>
                </div>
                <div onclick="abrirSubcarpeta('Certificado de Aptitud')" class="folder-card bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center">
                    <i class="fas fa-notes-medical text-6xl text-blue-500 mb-4"></i>
                    <span class="text-lg font-bold text-slate-700">Certificados de Aptitud</span>
                </div>
            </div>
        </div>

        <div id="seccionDocumentos" class="hidden animate-fade-in">
            <button onclick="volverAExpediente()" class="mb-6 flex items-center text-blue-600 font-semibold hover:text-blue-800">
                <i class="fas fa-arrow-left mr-2"></i> Volver al expediente
            </button>
            <div class="flex justify-between items-center mb-8">
                <h2 id="tituloCarpeta" class="text-2xl font-bold text-slate-800"></h2>
                <div class="flex gap-4">
                    <select id="filtroPeriodo" onchange="cargarDocsExpediente()" class="px-4 py-2 border-none rounded-xl shadow-sm bg-white">
                        <option value="">Todos los periodos</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                    <label class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl cursor-pointer shadow-lg shadow-blue-200 transition-all flex items-center">
                        <i class="fas fa-cloud-upload-alt mr-2"></i> Subir Documento
                        <input type="file" id="inputSubir" class="hidden" onchange="subirArchivo(this)">
                    </label>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200">
                <table class="w-full">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-8 py-4 text-left text-sm font-semibold text-slate-500">ARCHIVO</th>
                            <th class="px-8 py-4 text-left text-sm font-semibold text-slate-500">FECHA</th>
                            <th class="px-8 py-4 text-right text-sm font-semibold text-slate-500">ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="listaArchivosExpediente" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = 'https://isertel-production.up.railway.app/api';
        const token = localStorage.getItem('token');
        let currentEmpleadoId = null;
        let currentTipoExpediente = ''; // 'activo' o 'pasivo'
        let currentSubcarpeta = ''; // 'Certificado Médico' o 'Certificado de Aptitud'

        // Seguridad
        (function() {
            const rol = localStorage.getItem('rol');
            if (!token || rol !== 'doctor') { window.location.href = 'index.html'; }
        })();

        async function cargarEmpleados() {
            try {
                const [resActivos, resPasivos] = await Promise.all([
                    fetch(`${API_BASE}/activos`, { headers: {'Authorization': 'Bearer ' + token} }),
                    fetch(`${API_BASE}/pasivos`, { headers: {'Authorization': 'Bearer ' + token} })
                ]);
                
                const activos = await resActivos.json();
                const pasivos = await resPasivos.json();

                renderTable('listaActivos', activos, 'activo');
                renderTable('listaPasivos', pasivos, 'pasivo');
            } catch (e) { console.error(e); }
        }

        function renderTable(elementId, data, tipo) {
            const html = data.map(emp => `
                <tr class="hover:bg-blue-50 cursor-pointer transition-colors" ondblclick="verExpediente(${emp.id}, '${emp.nombres}', '${tipo}')">
                    <td class="px-8 py-4 font-medium text-slate-700">${emp.nombres}</td>
                    <td class="px-8 py-4 text-slate-500">${emp.cedula}</td>
                    ${tipo === 'activo' ? `<td class="px-8 py-4 text-slate-500">${emp.cargo || 'N/A'}</td>` : ''}
                </tr>
            `).join('');
            document.getElementById(elementId).innerHTML = html;
        }

        function verExpediente(id, nombre, tipo) {
            currentEmpleadoId = id;
            currentTipoExpediente = tipo;
            document.getElementById('seccionListas').classList.add('hidden');
            document.getElementById('seccionExpediente').classList.remove('hidden');
            document.getElementById('nombreEmpleadoTitulo').innerText = `Expediente Médico: ${nombre}`;
        }

        function abrirSubcarpeta(tipoDoc) {
            currentSubcarpeta = tipoDoc;
            document.getElementById('seccionExpediente').classList.add('hidden');
            document.getElementById('seccionDocumentos').classList.remove('hidden');
            document.getElementById('tituloCarpeta').innerText = tipoDoc + 's';
            cargarDocsExpediente();
        }

        async function cargarDocsExpediente() {
            const periodo = document.getElementById('filtroPeriodo').value;
            const endpoint = `${API_BASE}/documentos/${currentTipoExpediente}/${currentEmpleadoId}`;
            
            try {
                const res = await fetch(endpoint, { headers: {'Authorization': 'Bearer ' + token} });
                let docs = await res.json();
                
                // Filtrar por tipo de carpeta y periodo
                docs = docs.filter(d => d.tipo_documento.includes(currentSubcarpeta));
                if(periodo) {
                    docs = docs.filter(d => d.created_at.includes(periodo));
                }

                const html = docs.map(d => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-8 py-4 text-sm font-bold uppercase italic text-slate-600">${d.tipo_documento}</td>
                        <td class="px-8 py-4 text-sm text-slate-500">${new Date(d.created_at).toLocaleDateString()}</td>
                        <td class="px-8 py-4 text-right">
                            <a href="${d.url_cloudinary}" target="_blank" class="text-blue-600 hover:text-blue-800 mr-4"><i class="fas fa-eye"></i></a>
                            <button onclick="eliminarArchivo(${d.id})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
                document.getElementById('listaArchivosExpediente').innerHTML = html || '<tr><td colspan="3" class="p-8 text-center text-slate-400">No hay documentos en esta carpeta</td></tr>';
            } catch (e) { console.error(e); }
        }

        async function subirArchivo(input) {
            if (!input.files[0]) return;
            const formData = new FormData();
            formData.append('archivo', input.files[0]);
            formData.append('usuario_id', currentEmpleadoId);
            formData.append('tipo_documento', currentSubcarpeta);
            formData.append('tipo_tabla', currentTipoExpediente);

            try {
                const res = await fetch(`${API_BASE}/doctor/subir-expediente`, {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token},
                    body: formData
                });
                if(res.ok) {
                    input.value = '';
                    cargarDocsExpediente();
                }
            } catch (e) { alert("Error al subir"); }
        }

        async function eliminarArchivo(id) {
            if(!confirm("¿Eliminar documento?")) return;
            try {
                await fetch(`${API_BASE}/documentos/${id}`, {
                    method: 'DELETE',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                cargarDocsExpediente();
            } catch (e) { console.error(e); }
        }

        function volverAListas() {
            document.getElementById('seccionExpediente').classList.add('hidden');
            document.getElementById('seccionListas').classList.remove('hidden');
        }

        function volverAExpediente() {
            document.getElementById('seccionDocumentos').classList.add('hidden');
            document.getElementById('seccionExpediente').classList.remove('hidden');
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            volverAListas();
        }

        function filterTable(tableId, value) {
            const rows = document.querySelectorAll(`#${tableId} tbody tr`);
            const term = value.toLowerCase();
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        window.onload = cargarEmpleados;
    </script>
</body>
</html>
