<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-2xl font-black text-white tracking-tighter">ISER<span class="text-blue-500">TEL</span></h1>
            <p class="text-xs uppercase tracking-widest mt-2 text-slate-500 font-bold">Servicio Médico</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-3">
            <button onclick="mostrarTab('inicio')" id="btn-inicio" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition-all duration-200">
                <i class="fas fa-home mr-4 text-lg"></i> <span class="font-semibold">Inicio</span>
            </button>

            <div class="space-y-1">
                <button onclick="toggleSubmenu()" class="w-full flex items-center justify-between p-4 rounded-xl hover:bg-slate-800 transition-all">
                    <div class="flex items-center">
                        <i class="fas fa-folder-open mr-4 text-lg text-blue-400"></i> 
                        <span class="font-semibold">Expediente</span>
                    </div>
                    <i id="arrow-icon" class="fas fa-chevron-down text-xs transition-transform"></i>
                </button>
                <div id="submenu-expediente" class="hidden pl-12 pr-4 py-2 space-y-2">
                    <button onclick="abrirPanelGestion('Certificado Médico')" class="block w-full text-left text-sm hover:text-white py-1 transition-colors">
                        <i class="fas fa-file-medical mr-2 opacity-70"></i> Certificados Médicos
                    </button>
                    <button onclick="abrirPanelGestion('Certificado de Aptitud')" class="block w-full text-left text-sm hover:text-white py-1 transition-colors">
                        <i class="fas fa-file-invoice mr-2 opacity-70"></i> Certificados de Aptitud
                    </button>
                </div>
            </div>

            <button onclick="logout()" class="w-full flex items-center p-4 rounded-xl hover:bg-red-900/20 hover:text-red-400 transition-all mt-10">
                <i class="fas fa-sign-out-alt mr-4 text-lg"></i> <span class="font-semibold">Cerrar Sesión</span>
            </button>
        </nav>
    </div>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <div id="tab-inicio" class="tab-content active">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-slate-800">Bienvenido, Dr.</h2>
                <p class="text-slate-500">Gestione la documentación médica del personal.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-blue-600 p-6 rounded-2xl text-white shadow-lg">
                    <i class="fas fa-user-md text-4xl mb-4 opacity-50"></i>
                    <h3 class="text-xl font-bold">Resumen de Actividad</h3>
                    <p class="opacity-80 mt-2">Acceda rápidamente a los expedientes desde el menú lateral.</p>
                </div>
            </div>
        </div>

        <div id="panelGestionDocumental" class="hidden animate-fade-in">
            <div class="flex justify-between items-center mb-6">
                <h2 id="tituloPanel" class="text-2xl font-bold text-slate-800"></h2>
                <button onclick="cerrarPanel()" class="bg-slate-200 p-2 rounded-full hover:bg-slate-300 transition-colors">
                    <i class="fas fa-times px-1"></i>
                </button>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8">
                <div class="max-w-xl mx-auto text-center">
                    <div id="dropZone" class="border-2 border-dashed border-slate-300 p-10 rounded-3xl hover:border-blue-500 transition-all group cursor-pointer" onclick="document.getElementById('fileInput').click()">
                        <i class="fas fa-cloud-upload-alt text-5xl text-slate-300 group-hover:text-blue-500 mb-4"></i>
                        <h4 class="text-lg font-semibold text-slate-700">Subir nuevo documento</h4>
                        <p class="text-sm text-slate-400">Seleccione el archivo PDF o imagen para cargar al sistema</p>
                        <input type="file" id="fileInput" class="hidden" onchange="manejarSubida(this)">
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold uppercase text-slate-500 tracking-wider">Documento</th>
                            <th class="px-6 py-4 text-right text-xs font-bold uppercase text-slate-500 tracking-wider">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTablaDocumentos" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const API_BASE = "http://localhost:3000/api";
        const token = localStorage.getItem('token');
        let tipoDocumentoActual = "";

        // Funciones de Interfaz
        function toggleSubmenu() {
            const submenu = document.getElementById('submenu-expediente');
            const arrow = document.getElementById('arrow-icon');
            submenu.classList.toggle('hidden');
            arrow.classList.toggle('rotate-180');
        }

        function mostrarTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById('panelGestionDocumental').classList.add('hidden');
        }

        function abrirPanelGestion(tipo) {
            tipoDocumentoActual = tipo;
            // Ocultar tabs de inicio
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            // Mostrar panel y configurar título
            const panel = document.getElementById('panelGestionDocumental');
            panel.classList.remove('hidden');
            document.getElementById('tituloPanel').innerText = `Gestión de ${tipo}s`;
            
            cargarDocumentos();
        }

        function cerrarPanel() {
            document.getElementById('panelGestionDocumental').classList.add('hidden');
            mostrarTab('inicio');
        }

        // Lógica de Datos
        async function cargarDocumentos() {
            const tbody = document.getElementById('cuerpoTablaDocumentos');
            tbody.innerHTML = '<tr><td colspan="2" class="text-center py-10"><i class="fas fa-spinner fa-spin text-blue-500"></i> Cargando...</td></tr>';

            try {
                // Seleccionar endpoint basado en el tipo
                const endpoint = tipoDocumentoActual === 'Certificado Médico' ? '/doctor/mis-certificados' : '/doctor/mis-aptitudes';
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const docs = await res.json();

                if (docs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2" class="text-center py-10 text-slate-400 italic">No hay documentos registrados.</td></tr>';
                    return;
                }

                tbody.innerHTML = docs.map(d => `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <i class="fas fa-file-pdf text-red-500 mr-3 text-lg"></i>
                                <span class="font-medium text-slate-700">${d.tipo_documento || 'Documento'}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <a href="${d.url_cloudinary}" target="_blank" class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition-all mr-2">
                                <i class="fas fa-eye"></i>
                            </a>
                            <button onclick="eliminarDocumento(${d.id})" class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-red-50 text-red-600 hover:bg-red-600 hover:text-white transition-all">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="2" class="text-center py-10 text-red-500">Error al cargar datos.</td></tr>';
            }
        }

        async function manejarSubida(input) {
            if (!input.files[0]) return;
            
            const formData = new FormData();
            formData.append('archivo', input.files[0]);
            formData.append('tipo_documento', tipoDocumentoActual);

            const endpoint = tipoDocumentoActual === 'Certificado Médico' ? '/doctor/subir' : '/doctor/subir-aptitud';

            try {
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });

                if (res.ok) {
                    alert('Documento subido correctamente');
                    cargarDocumentos();
                } else {
                    alert('Error en la subida');
                }
            } catch (error) {
                alert('Error de conexión');
            }
            input.value = ""; // Reset input
        }

        async function eliminarDocumento(id) {
            if (!confirm('¿Seguro que desea eliminar este archivo?')) return;
            
            const endpoint = tipoDocumentoActual === 'Certificado Médico' ? `/doctor/medico/${id}` : `/doctor/aptitud/${id}`;

            try {
                await fetch(`${API_BASE}${endpoint}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                cargarDocumentos();
            } catch (err) {
                console.error(err);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
