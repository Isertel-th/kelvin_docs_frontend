<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .folder-card:hover { transform: scale(1.02); transition: all 0.2s; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-500/10 mb-4">
                <i class="fas fa-user-md text-3xl text-blue-500"></i>
            </div>
            <h2 class="text-white font-black uppercase text-xs tracking-widest">Servicio Médico</h2>
            <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold">Isertel S.A.</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-3">
            <p class="text-[10px] font-bold text-slate-500 uppercase px-3 mb-2 tracking-widest">Navegación</p>
            <button onclick="showTab('tab-inicio')" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition-all duration-200 hover:bg-slate-800 group">
                <i class="fas fa-th-large mr-3 w-5 group-hover:text-blue-400"></i> <span class="text-sm font-semibold">Inicio</span>
            </button>
            <button onclick="showTab('tab-personal'); setModoLista('activos')" class="sidebar-item w-full flex items-center p-4 rounded-xl transition-all duration-200 hover:bg-slate-800 group">
                <i class="fas fa-users mr-3 w-5 group-hover:text-blue-400"></i> <span class="text-sm font-semibold">Personal Activo</span>
            </button>
            <button onclick="showTab('tab-personal'); setModoLista('pasivos')" class="sidebar-item w-full flex items-center p-4 rounded-xl transition-all duration-200 hover:bg-slate-800 group">
                <i class="fas fa-user-clock mr-3 w-5 group-hover:text-blue-400"></i> <span class="text-sm font-semibold">Archivo Pasivo</span>
            </button>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center p-4 rounded-xl text-red-400 hover:bg-red-500/10 transition-all font-bold text-sm">
                <i class="fas fa-power-off mr-3"></i> Salir del Sistema
            </button>
        </div>
    </div>

    <div class="flex-1 p-10 overflow-y-auto relative">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Panel de Control</h1>
                <p class="text-slate-500 text-sm mt-1">Bienvenido, Dr. <span id="nombreDoctor" class="text-blue-600 font-bold">...</span></p>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                <img src="https://www.isertel.com.ec/wp-content/uploads/2021/03/logo-isertel.png" alt="Logo" class="h-8">
            </div>
        </header>

        <div id="tab-inicio" class="tab-content active">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-12 rounded-[2rem] text-white shadow-2xl shadow-blue-200 relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-4xl font-black mb-4">Gestión Médica Isertel</h2>
                    <p class="text-blue-100 text-lg max-w-xl leading-relaxed">Doble clic sobre un empleado en las listas de activos o pasivos para gestionar su expediente médico.</p>
                </div>
                <i class="fas fa-heartbeat absolute -right-10 -bottom-10 text-[15rem] text-white/10 rotate-12"></i>
            </div>
        </div>

        <div id="tab-personal" class="tab-content">
            <div class="mb-6 flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[300px] relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="filtroNombre" onkeyup="ejecutarFiltros()" placeholder="Buscar por nombre o cédula..." class="w-full pl-12 pr-6 py-4 rounded-2xl border-none shadow-sm ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all">
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                    <h3 class="font-bold text-slate-800 uppercase text-xs tracking-widest" id="tituloLista">Lista de Personal</h3>
                </div>
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-slate-400 text-[10px] uppercase font-black border-b tracking-widest">
                        <tr>
                            <th class="px-8 py-5">Colaborador (Doble clic para abrir)</th>
                            <th class="px-8 py-5 text-right">Identificación</th>
                        </tr>
                    </thead>
                    <tbody id="listaEmps" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="modalC" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden animate-fade-in">
                <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <button id="btnRetrocederCarpeta" onclick="renderizarVistaCarpetas()" class="hidden bg-slate-200 p-2 rounded-lg hover:bg-slate-300"><i class="fas fa-arrow-left"></i></button>
                        <h3 class="font-bold text-slate-800 italic uppercase text-sm">📂 Expediente: <span id="nEmp" class="text-blue-600"></span> <span id="rutaCarpeta" class="text-slate-400 ml-2"></span></h3>
                    </div>
                    <button onclick="cerrarModal()" class="text-2xl text-slate-400 hover:text-red-500 transition-colors">&times;</button>
                </div>

                <div id="barraFiltrosModal" class="hidden px-6 py-3 bg-white border-b flex flex-wrap gap-3 items-center">
                    <div class="flex-1 min-w-[120px] relative">
                        <input type="text" id="filtroNombreArchivo" onkeyup="renderizarArchivosCarpeta()" placeholder="Buscar archivo..." class="w-full p-2 border rounded-lg text-[10px] font-bold outline-none bg-slate-50 focus:ring-2 focus:ring-blue-500 uppercase">
                    </div>
                    <div class="flex-1 min-w-[120px]">
                        <select id="filtroAnioArchivo" onchange="renderizarArchivosCarpeta()" class="w-full p-2 border rounded-lg text-[10px] font-bold bg-slate-50 outline-none">
                            <option value="">Cualquier Año</option>
                            <option value="2024">2024</option><option value="2025">2025</option><option value="2026">2026</option>
                        </select>
                    </div>
                </div>

                <div id="cuerpoModal" class="p-8 max-h-[60vh] overflow-y-auto"></div>

                <div id="footerModal" class="hidden p-6 bg-slate-50 border-t">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-1">Subir nuevo documento</label>
                            <input type="file" id="archivoNuevo" accept="application/pdf,image/*" class="text-xs">
                        </div>
                        <button onclick="subirArchivo()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold uppercase hover:bg-blue-700 shadow-lg transition-all">Subir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let modoLista = 'activos';
        let empSeleccionado = null;
        let carpetaActual = null;
        let todosLosDocs = [];
        let empsOriginales = [];

        window.onload = () => {
            const token = localStorage.getItem('token');
            if (!token || localStorage.getItem('rol') !== 'doc') { window.location.href = 'index.html'; }
            document.getElementById('nombreDoctor').innerText = localStorage.getItem('nombre') || 'Médico';
            loadData('activos');
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function loadData(modo) {
            modoLista = modo;
            document.getElementById('tituloLista').innerText = `Lista de Personal ${modo === 'activos' ? 'Activo' : 'Pasivo'}`;
            try {
                const res = await fetch(`${API_BASE}/admin/${modo}`, { 
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } 
                });
                empsOriginales = await res.json();
                renderizarLista(empsOriginales);
            } catch (e) { console.error(e); }
        }

        function renderizarLista(data) {
            const tbody = document.getElementById('listaEmps');
            tbody.innerHTML = data.map(e => `
                <tr class="hover:bg-blue-50 cursor-pointer transition-all" ondblclick="abrirExpediente(${JSON.stringify(e).replace(/"/g, '&quot;')})">
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xs">
                                ${e.nombre_completo.charAt(0)}
                            </div>
                            <span class="font-bold text-slate-700 text-sm uppercase">${e.nombre_completo}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-right font-mono text-xs text-slate-500">${e.cedula}</td>
                </tr>
            `).join('');
        }

        function abrirExpediente(emp) {
            empSeleccionado = emp;
            document.getElementById('nEmp').innerText = emp.nombre_completo;
            document.getElementById('modalC').classList.remove('hidden');
            renderizarVistaCarpetas();
        }

        function renderizarVistaCarpetas() {
            carpetaActual = null;
            document.getElementById('rutaCarpeta').innerText = "";
            document.getElementById('btnRetrocederCarpeta').classList.add('hidden');
            document.getElementById('barraFiltrosModal').classList.add('hidden');
            document.getElementById('footerModal').classList.add('hidden');
            
            const cuerpo = document.getElementById('cuerpoModal');
            cuerpo.innerHTML = `
                <div class="grid grid-cols-2 gap-6">
                    <div onclick="abrirCarpeta('Certificado médico')" class="folder-card bg-slate-50 p-8 rounded-2xl border-2 border-transparent hover:border-blue-500 cursor-pointer text-center transition-all">
                        <i class="fas fa-notes-medical text-4xl text-blue-500 mb-3"></i>
                        <h4 class="font-bold text-slate-700 text-sm uppercase">Certificados Médicos</h4>
                    </div>
                    <div onclick="abrirCarpeta('Certificado de aptitud')" class="folder-card bg-slate-50 p-8 rounded-2xl border-2 border-transparent hover:border-blue-500 cursor-pointer text-center transition-all">
                        <i class="fas fa-file-medical-alt text-4xl text-emerald-500 mb-3"></i>
                        <h4 class="font-bold text-slate-700 text-sm uppercase">Certificados de Aptitud</h4>
                    </div>
                </div>
            `;
        }

        async function abrirCarpeta(tipo) {
            carpetaActual = tipo;
            document.getElementById('rutaCarpeta').innerText = `> ${tipo}s`;
            document.getElementById('btnRetrocederCarpeta').classList.remove('hidden');
            document.getElementById('barraFiltrosModal').classList.remove('hidden');
            document.getElementById('footerModal').classList.remove('hidden');

            const endpoint = modoLista === 'activos' ? 'activo' : 'pasivo';
            const res = await fetch(`${API_BASE}/doctor/documentos-${endpoint}/${empSeleccionado.id}`, {
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
            });
            todosLosDocs = await res.json();
            renderizarArchivosCarpeta();
        }

        function renderizarArchivosCarpeta() {
            const query = document.getElementById('filtroNombreArchivo').value.toLowerCase();
            const anio = document.getElementById('filtroAnioArchivo').value;
            
            const docsFiltrados = todosLosDocs.filter(d => {
                const matchTipo = d.tipo_documento.includes(carpetaActual);
                const matchNombre = d.url_cloudinary.toLowerCase().includes(query);
                const matchAnio = anio ? d.created_at.includes(anio) : true;
                return matchTipo && matchNombre && matchAnio;
            });

            const cuerpo = document.getElementById('cuerpoModal');
            if (docsFiltrados.length === 0) {
                cuerpo.innerHTML = `<div class="text-center py-10 text-slate-400 font-bold italic text-xs">No hay documentos en esta carpeta</div>`;
                return;
            }

            cuerpo.innerHTML = `
                <table class="w-full text-left">
                    <thead class="text-[10px] font-black text-slate-400 uppercase border-b">
                        <tr><th class="pb-3">Archivo</th><th class="pb-3 text-right">Ver</th></tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${docsFiltrados.map(d => `
                            <tr>
                                <td class="py-4">
                                    <p class="text-xs font-bold text-slate-700 uppercase">Documento ID: ${d.id}</p>
                                    <p class="text-[10px] text-slate-400">${new Date(d.created_at).toLocaleDateString()}</p>
                                </td>
                                <td class="py-4 text-right">
                                    <a href="${d.url_cloudinary}" target="_blank" class="text-blue-600 hover:text-blue-800"><i class="fas fa-eye"></i></a>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function subirArchivo() {
            const fileInput = document.getElementById('archivoNuevo');
            if (!fileInput.files[0]) return alert("Selecciona un archivo");

            const formData = new FormData();
            formData.append('archivo', fileInput.files[0]);
            formData.append('tipo_documento', carpetaActual);

            const endpoint = modoLista === 'activos' ? 'subir-activo' : 'subir-pasivo';
            try {
                const res = await fetch(`${API_BASE}/doctor/${endpoint}/${empSeleccionado.id}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                    body: formData
                });
                if (res.ok) {
                    fileInput.value = "";
                    abrirCarpeta(carpetaActual);
                }
            } catch (e) { console.error(e); }
        }

        function ejecutarFiltros() {
            const query = document.getElementById('filtroNombre').value.toLowerCase();
            const filtrados = empsOriginales.filter(e => 
                e.nombre_completo.toLowerCase().includes(query) || e.cedula.includes(query)
            );
            renderizarLista(filtrados);
        }

        function setModoLista(modo) {
            loadData(modo);
        }

        function cerrarModal() {
            document.getElementById('modalC').classList.add('hidden');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
