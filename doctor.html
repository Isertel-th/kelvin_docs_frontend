<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .folder-card:hover { transform: scale(1.02); transition: all 0.2s; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-white text-2xl font-black tracking-tighter italic">ISER<span class="text-blue-500">TEL</span></h1>
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-500 mt-1">Medical Management</p>
        </div>
        <nav class="flex-1 p-6 space-y-2">
            <div onclick="showTab('dashboard')" class="sidebar-item active p-4 rounded-xl cursor-pointer flex items-center gap-3 transition-all font-medium">
                <i class="fas fa-users"></i> Gestión de Personal
            </div>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full bg-slate-800 hover:bg-red-600 hover:text-white p-4 rounded-xl transition-all flex items-center justify-center gap-2 font-bold">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <main class="flex-1 flex flex-col">
        <header class="h-20 bg-white border-b border-slate-200 flex items-center justify-between px-10 shadow-sm">
            <h2 id="tabTitle" class="text-xl font-bold text-slate-800">Gestión de Personal</h2>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-sm font-bold text-slate-600 bg-slate-100 px-4 py-2 rounded-full">Médico</span>
            </div>
        </header>

        <div class="p-10">
            <div id="dashboard" class="tab-content active">
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="relative flex-1 max-w-md">
                            <i class="fas fa-search absolute left-4 top-3.5 text-slate-400"></i>
                            <input type="text" id="busquedaTrabajador" oninput="cargarLista()" placeholder="Buscar por nombre o cédula..." class="w-full pl-12 pr-4 py-3 rounded-2xl border-none bg-white shadow-inner focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-500 text-[11px] uppercase tracking-wider font-bold">
                                    <th class="px-8 py-5">Trabajador</th>
                                    <th class="px-8 py-5">Cédula</th>
                                    <th class="px-8 py-5 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="listaTrabajadores" class="divide-y divide-slate-100 text-slate-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalExpediente" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-fade-in">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <div>
                    <h3 id="modalNombreUsuario" class="text-xl font-bold text-slate-800 leading-tight">Expediente</h3>
                    <p class="text-sm text-slate-500 font-medium flex items-center gap-2">
                        <span id="modalCedulaUsuario"></span> 
                        <span id="rutaCarpeta" class="text-blue-600 font-bold"></span>
                    </p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="btnRetrocederCarpeta" onclick="renderizarVistaCarpetas()" class="hidden bg-white border border-slate-200 text-slate-600 px-4 py-2 rounded-xl hover:bg-slate-100 transition-all flex items-center gap-2 text-sm font-bold">
                        <i class="fas fa-arrow-left"></i> Volver
                    </button>
                    <button onclick="cerrarExpediente()" class="text-slate-400 hover:text-red-500 transition-colors p-2 text-2xl">&times;</button>
                </div>
            </div>

            <div id="cuerpoExpediente" class="flex-1 overflow-y-auto p-6">
                <div id="barraFiltrosModal" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <select id="filtroTipoDoc" onchange="renderizarArchivosCarpeta()" class="p-2.5 rounded-xl border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></select>
                    <input type="text" id="filtroNombreArchivo" oninput="renderizarArchivosCarpeta()" placeholder="Buscar en esta carpeta..." class="p-2.5 rounded-xl border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div id="lDocs"></div>
            </div>

            <div id="footerSubida" class="hidden p-6 border-t bg-slate-50">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Subir a <span id="folderLabel" class="text-blue-600"></span></label>
                        <div class="flex gap-2">
                            <select id="tipoDocMedico" class="flex-1 p-2.5 rounded-xl border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none"></select>
                            <label class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl cursor-pointer transition-all flex items-center gap-2 font-bold text-sm shadow-lg shadow-blue-200">
                                <i class="fas fa-upload"></i> Seleccionar y Subir
                                <input type="file" id="inputSubirDoc" class="hidden" accept="application/pdf,image/*">
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://isertel-backend.rendercom"; // Reemplaza por tu URL real
        const token = localStorage.getItem('token');
        let usuarioIdActual = null;
        let documentosCargados = [];
        let carpetaActual = null;

        // --- LÓGICA DE INICIO ---
        window.onload = () => {
            if(!token) window.location.href = 'index.html';
            cargarLista();
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // --- GESTIÓN DE PERSONAL ---
        async function cargarLista() {
            const query = document.getElementById('busquedaTrabajador').value;
            const res = await fetch(`${API_BASE}/doctor/usuarios?q=${query}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const usuarios = await res.json();
            const tbody = document.getElementById('listaTrabajadores');
            tbody.innerHTML = usuarios.map(u => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-8 py-5 font-bold text-slate-800">${u.nombre_completo}</td>
                    <td class="px-8 py-5 text-slate-500">${u.cedula}</td>
                    <td class="px-8 py-5 text-right">
                        <button onclick="abrirExpediente(${u.id}, '${u.nombre_completo}', '${u.cedula}')" class="bg-blue-50 text-blue-600 px-5 py-2.5 rounded-xl hover:bg-blue-600 hover:text-white transition-all font-bold text-xs">
                            <i class="fas fa-folder-open mr-2"></i> EXPEDIENTE
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // --- LÓGICA DEL EXPEDIENTE ---
        async function abrirExpediente(id, nombre, cedula) {
            usuarioIdActual = id;
            document.getElementById('modalNombreUsuario').innerText = nombre;
            document.getElementById('modalCedulaUsuario').innerText = "CI: " + cedula;
            document.getElementById('modalExpediente').classList.remove('hidden');
            
            // Cargar docs del usuario
            const res = await fetch(`${API_BASE}/doctor/expediente/${id}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            documentosCargados = await res.json();
            
            renderizarVistaCarpetas();
        }

        function renderizarVistaCarpetas() {
            carpetaActual = null;
            document.getElementById('rutaCarpeta').innerText = "";
            document.getElementById('btnRetrocederCarpeta').classList.add('hidden');
            document.getElementById('footerSubida').classList.add('hidden');
            document.getElementById('barraFiltrosModal').classList.add('hidden');
            
            document.getElementById('lDocs').innerHTML = `
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <div onclick="entrarCarpeta('Certificados medicos')" class="folder-card bg-blue-50 border-2 border-dashed border-blue-200 p-8 rounded-2xl flex flex-col items-center cursor-pointer hover:border-blue-500 hover:bg-blue-100 transition-all">
                        <i class="fas fa-notes-medical text-4xl text-blue-600 mb-3"></i>
                        <span class="font-bold text-xs uppercase text-slate-600">Certificados Médicos</span>
                    </div>
                    <div onclick="entrarCarpeta('Aptitud Médica')" class="folder-card bg-emerald-50 border-2 border-dashed border-emerald-200 p-8 rounded-2xl flex flex-col items-center cursor-pointer hover:border-emerald-500 hover:bg-emerald-100 transition-all">
                        <i class="fas fa-user-check text-4xl text-emerald-600 mb-3"></i>
                        <span class="font-bold text-xs uppercase text-slate-600">Aptitud Médica</span>
                    </div>
                    <div onclick="entrarCarpeta('Historias Clínicas')" class="folder-card bg-purple-50 border-2 border-dashed border-purple-200 p-8 rounded-2xl flex flex-col items-center cursor-pointer hover:border-purple-500 hover:bg-purple-100 transition-all">
                        <i class="fas fa-file-medical text-4xl text-purple-600 mb-3"></i>
                        <span class="font-bold text-xs uppercase text-slate-600">Historias Clínicas</span>
                    </div>
                    <div onclick="entrarCarpeta('Exámenes')" class="folder-card bg-orange-50 border-2 border-dashed border-orange-200 p-8 rounded-2xl flex flex-col items-center cursor-pointer hover:border-orange-500 hover:bg-orange-100 transition-all">
                        <i class="fas fa-vial text-4xl text-orange-600 mb-3"></i>
                        <span class="font-bold text-xs uppercase text-slate-600">Exámenes</span>
                    </div>
                </div>`;
        }

        function entrarCarpeta(nombreCarpeta) {
            carpetaActual = nombreCarpeta;
            document.getElementById('rutaCarpeta').innerText = "> " + nombreCarpeta;
            document.getElementById('btnRetrocederCarpeta').classList.remove('hidden');
            document.getElementById('footerSubida').classList.remove('hidden');
            document.getElementById('barraFiltrosModal').classList.remove('hidden');
            document.getElementById('folderLabel').innerText = nombreCarpeta;

            const selectSubida = document.getElementById('tipoDocMedico');
            const selectFiltro = document.getElementById('filtroTipoDoc');
            let ops = "";

            if(nombreCarpeta === 'Certificados medicos') ops = '<option>Certificado médico IESS</option><option>Certificado médico privado</option><option>Certificado médico MSP</option><option>Reposo médico</option>';
            else if(nombreCarpeta === 'Aptitud Médica') ops = '<option>Apto</option><option>Apto en observación</option><option>No Apto</option>';
            else if(nombreCarpeta === 'Historias Clínicas') ops = '<option>Ficha Médica Ocupacional</option><option>Historia Clínica Periódica</option>';
            else ops = '<option>Examen de laboratorio</option><option>Rayos X</option><option>Audiometría</option>';

            selectSubida.innerHTML = ops;
            selectFiltro.innerHTML = '<option value="">Todos los tipos</option>' + ops;
            
            renderizarArchivosCarpeta();
        }

        function renderizarArchivosCarpeta() {
            const fTipo = document.getElementById('filtroTipoDoc').value.toLowerCase();
            const fNombre = document.getElementById('filtroNombreArchivo').value.toLowerCase();

            let pClave = [];
            if(carpetaActual === 'Certificados medicos') pClave = ['medico', 'médico', 'reposo', 'iess', 'msp'];
            else if(carpetaActual === 'Aptitud Médica') pClave = ['apto', 'aptitud'];
            else if(carpetaActual === 'Historias Clínicas') pClave = ['ficha', 'historia', 'clinica'];
            else pClave = ['examen', 'rayos', 'audiometria', 'laboratorio'];

            let docs = documentosCargados.filter(d => pClave.some(p => d.tipo_documento.toLowerCase().includes(p)));
            
            if (fTipo) docs = docs.filter(d => d.tipo_documento.toLowerCase().includes(fTipo));
            if (fNombre) docs = docs.filter(d => d.tipo_documento.toLowerCase().includes(fNombre));

            if(docs.length === 0) {
                document.getElementById('lDocs').innerHTML = `<div class="text-center py-12"><i class="fas fa-folder-open text-4xl text-slate-200 mb-2"></i><p class="text-slate-400">Sin documentos</p></div>`;
                return;
            }

            document.getElementById('lDocs').innerHTML = `
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-bold">
                        <tr><th class="px-4 py-3">Documento</th><th class="px-4 py-3 text-right">Acciones</th></tr>
                    </thead>
                    <tbody class="divide-y">
                        ${docs.map(d => `
                            <tr>
                                <td class="px-4 py-4">
                                    <p class="font-bold text-slate-700 text-xs italic uppercase">${d.tipo_documento}</p>
                                    <p class="text-[10px] text-slate-400">${new Date(d.created_at).toLocaleDateString()}</p>
                                </td>
                                <td class="px-4 py-4 text-right">
                                    <a href="${d.url_cloudinary}" target="_blank" class="text-blue-600 p-2"><i class="fas fa-eye"></i></a>
                                    <button onclick="eliminarDoc(${d.id})" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
        }

        // --- SUBIDA Y ELIMINACIÓN ---
        document.getElementById('inputSubirDoc').onchange = async function() {
            if(!this.files[0]) return;
            const formData = new FormData();
            formData.append('archivo', this.files[0]);
            formData.append('usuario_id', usuarioIdActual);
            formData.append('tipo_documento', document.getElementById('tipoDocMedico').value);

            try {
                document.getElementById('lDocs').innerHTML = `<div class="text-center py-10"><i class="fas fa-spinner fa-spin text-blue-500"></i> Subiendo...</div>`;
                const res = await fetch(`${API_BASE}/doctor/subir-aptitud`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token },
                    body: formData
                });
                if(res.ok) {
                    // Recargar docs y volver a renderizar la carpeta
                    const resDocs = await fetch(`${API_BASE}/doctor/expediente/${usuarioIdActual}`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    documentosCargados = await resDocs.json();
                    renderizarArchivosCarpeta();
                } else {
                    alert("Error al subir");
                    renderizarArchivosCarpeta();
                }
            } catch(e) { alert("Error de conexión"); }
            this.value = "";
        };

        async function eliminarDoc(id) {
            if(!confirm("¿Eliminar este documento?")) return;
            const res = await fetch(`${API_BASE}/doctor/aptitud/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(res.ok) {
                documentosCargados = documentosCargados.filter(d => d.id !== id);
                renderizarArchivosCarpeta();
            }
        }

        function cerrarExpediente() {
            document.getElementById('modalExpediente').classList.add('hidden');
        }
    </script>
</body>
</html>
