<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    
    <script>
        (function() {
            const token = localStorage.getItem('token');
            const rol = localStorage.getItem('rol');
            // Validamos que el rol sea doctor o admin
            if (!token || (rol !== 'doctor' && rol !== 'admin')) { 
                console.warn("Acceso denegado. Redirigiendo...");
                window.location.replace('index.html'); 
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .sidebar-item.active { background: #2563eb; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <div class="w-16 h-16 bg-blue-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
                <i class="fas fa-user-md text-3xl text-white"></i>
            </div>
            <h2 class="text-lg font-bold text-white">Panel Médico</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="showTab('personal')" class="sidebar-item w-full flex items-center p-4 rounded-xl hover:bg-slate-800 transition-all active" id="btn-personal">
                <i class="fas fa-users mr-4"></i> <span>Personal</span>
            </button>
            <button onclick="showTab('aptitud')" class="sidebar-item w-full flex items-center p-4 rounded-xl hover:bg-slate-800 transition-all" id="btn-aptitud">
                <i class="fas fa-file-medical mr-4"></i> <span>Certificados</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full text-slate-400 hover:text-red-400 flex items-center justify-center py-2">
                <i class="fas fa-sign-out-alt mr-2"></i> Salir
            </button>
        </div>
    </div>

    <div class="flex-1 p-10 overflow-y-auto">
        
        <div id="personal" class="tab-content active">
            <div id="headerPersonal" class="mb-6">
                <h1 class="text-3xl font-bold text-slate-800">Gestión de Personal</h1>
            </div>

            <div id="contenedorTablasPersonal" class="space-y-8">
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
                    <div class="bg-blue-600 px-6 py-3 flex justify-between">
                        <span class="text-white font-bold uppercase text-sm">Personal Activo</span>
                        <span id="countActivos" class="text-blue-100 text-xs font-bold"></span>
                    </div>
                    <table class="w-full text-left">
                        <tbody id="tActivos" class="divide-y divide-slate-100">
                            <tr><td class="p-6 text-center text-slate-400">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
                    <div class="bg-slate-600 px-6 py-3 flex justify-between">
                        <span class="text-white font-bold uppercase text-sm">Personal Pasivo</span>
                        <span id="countPasivos" class="text-slate-300 text-xs font-bold"></span>
                    </div>
                    <table class="w-full text-left">
                        <tbody id="tPasivos" class="divide-y divide-slate-100">
                            <tr><td class="p-6 text-center text-slate-400">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="seccionExpediente" class="hidden">
                <div class="flex items-center mb-6">
                    <button onclick="volverALista()" class="bg-white p-2 rounded-full shadow mr-4 text-blue-600">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2 class="text-2xl font-bold text-slate-800" id="nombreEmpleadoExpediente"></h2>
                </div>
                <div id="listaDocumentosExpediente" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 bg-slate-200 p-6 rounded-xl border-2 border-dashed border-slate-300"></div>
            </div>
        </div>

        <div id="aptitud" class="tab-content">
            <h1 class="text-3xl font-bold text-slate-800 mb-6">Subir Certificados</h1>
            <div id="lAptDocs" class="bg-white rounded-xl shadow-sm"></div>
        </div>
    </div>

    <script>
        const API_BASE = "https://isertel-backend.onrender.com/api";
        const token = localStorage.getItem('token');

        function logout() { localStorage.clear(); window.location.replace('index.html'); }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');
            if(tabId === 'personal') volverALista();
        }

        async function cargarTodo() {
            if (!token) return logout();
            await cargarPersonal();
        }
        window.onload = cargarTodo;

        async function cargarPersonal() {
            try {
                const res = await fetch(`${API_BASE}/admin/personal`, { 
                    headers: { 'Authorization': 'Bearer ' + token } 
                });
                const data = await res.json();
                
                // Renderizar Activos
                document.getElementById('countActivos').innerText = (data.activos || []).length;
                document.getElementById('tActivos').innerHTML = (data.activos || []).map(u => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 font-bold text-slate-700">${u.nombre}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="verExpediente(${u.id}, '${u.nombre}')" class="bg-blue-600 text-white px-4 py-1 rounded-lg text-xs font-bold shadow-sm">
                                EXPEDIENTE
                            </button>
                        </td>
                    </tr>
                `).join('');

                // Renderizar Pasivos
                document.getElementById('countPasivos').innerText = (data.pasivos || []).length;
                document.getElementById('tPasivos').innerHTML = (data.pasivos || []).map(u => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 text-slate-500">${u.nombre}</td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="verExpediente(${u.id}, '${u.nombre}')" class="bg-slate-400 text-white px-4 py-1 rounded-lg text-xs font-bold">
                                EXPEDIENTE
                            </button>
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error("Error cargando personal:", error);
            }
        }

        async function verExpediente(id, nombre) {
            document.getElementById('nombreEmpleadoExpediente').innerText = nombre;
            document.getElementById('contenedorTablasPersonal').classList.add('hidden');
            document.getElementById('headerPersonal').classList.add('hidden');
            document.getElementById('seccionExpediente').classList.remove('hidden');
            
            const container = document.getElementById('listaDocumentosExpediente');
            container.innerHTML = '<p class="col-span-full text-center">Cargando...</p>';

            try {
                const res = await fetch(`${API_BASE}/doctor/documentos-usuario/${id}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const docs = await res.json();

                if (docs.length === 0) {
                    container.innerHTML = '<p class="col-span-full text-center text-slate-500 italic">No hay documentos en este expediente.</p>';
                    return;
                }

                container.innerHTML = docs.map(d => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-slate-800 text-xs uppercase">${d.tipo_documento}</p>
                            <p class="text-[10px] text-slate-400">${new Date(d.created_at).toLocaleDateString()}</p>
                        </div>
                        <a href="${d.url_cloudinary}" target="_blank" class="bg-blue-50 text-blue-600 p-2 rounded-full hover:bg-blue-600 hover:text-white transition-all">
                            <i class="fas fa-eye"></i>
                        </a>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = 'Error al cargar el expediente.';
            }
        }

        function volverALista() {
            document.getElementById('seccionExpediente').classList.add('hidden');
            document.getElementById('contenedorTablasPersonal').classList.remove('hidden');
            document.getElementById('headerPersonal').classList.remove('hidden');
        }
    </script>
</body>
</html>
