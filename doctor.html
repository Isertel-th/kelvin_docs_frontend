<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - Isertel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sidebar-item.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        /* Estilo para las tarjetas de archivos dentro del expediente */
        .folder-card:hover { transform: scale(1.02); transition: all 0.2s; }
    </style>
</head>
<body class="flex min-h-screen">

    <div class="w-72 bg-slate-900 text-slate-300 flex flex-col shadow-2xl">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-white text-2xl font-black tracking-tighter italic">ISER<span class="text-blue-500">TEL</span></h1>
            <p class="text-xs mt-2 text-slate-500 font-bold uppercase tracking-widest">Panel Médico</p>
        </div>
        
        <nav class="flex-1 p-6 space-y-3">
            <button onclick="showTab('activos')" class="sidebar-item active w-full flex items-center p-4 rounded-xl transition-all duration-200 group">
                <i class="fas fa-user-check mr-4 text-lg"></i>
                <span class="font-semibold">Personal Activo</span>
            </button>
            <button onclick="showTab('pasivos')" class="sidebar-item w-full flex items-center p-4 rounded-xl transition-all duration-200 group">
                <i class="fas fa-user-clock mr-4 text-lg"></i>
                <span class="font-semibold">Personal Pasivo</span>
            </button>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <button onclick="localStorage.clear(); window.location.href='index.html';" class="w-full bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white p-4 rounded-xl flex items-center justify-center transition-all font-bold">
                <i class="fas fa-sign-out-alt mr-3"></i> Cerrar Sesión
            </button>
        </div>
    </div>

    <main class="flex-1 p-10 overflow-y-auto">
        
        <div id="activos" class="tab-content active">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-800">Personal Activo</h2>
                    <p class="text-slate-500 mt-1">Gestión de expedientes y certificados actuales</p>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase italic">Empleado</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase italic text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaActivos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>

        <div id="pasivos" class="tab-content">
            <div class="mb-8">
                <h2 class="text-3xl font-extrabold text-slate-800">Personal Pasivo</h2>
                <p class="text-slate-500 mt-1">Histórico de personal desvinculado</p>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase italic">Empleado</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase italic text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="listaPasivos" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalExpediente" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[85vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <div>
                    <h3 id="tituloExpediente" class="text-xl font-black text-slate-800 uppercase italic tracking-tighter"></h3>
                    <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">Documentación del Empleado</p>
                </div>
                <button onclick="cerrarExpediente()" class="h-10 w-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-red-500 hover:text-white transition-all text-xl">&times;</button>
            </div>
            <div class="p-8 overflow-y-auto bg-slate-50/50 flex-1">
                <div id="contenidoExpediente" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://isertelsystem-production.up.railway.app/api";
        const token = localStorage.getItem('token');

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            if(tabId === 'activos') cargarActivos();
            if(tabId === 'pasivos') cargarPasivos();
        }

        async function cargarActivos() {
            try {
                const res = await fetch(`${API_BASE}/admin/personal`, { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const tbody = document.getElementById('listaActivos');
                tbody.innerHTML = data.map(u => `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="h-10 w-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold mr-3">
                                    ${u.nombre.charAt(0)}
                                </div>
                                <div>
                                    <p class="font-bold text-slate-700 uppercase italic text-sm">${u.nombre}</p>
                                    <p class="text-xs text-slate-400 font-medium">${u.cedula}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="verExpediente(${u.id}, '${u.nombre}', 'activos')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-blue-700 transition shadow-sm">
                                <i class="fas fa-folder-open mr-2"></i> Expediente
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        async function cargarPasivos() {
            try {
                const res = await fetch(`${API_BASE}/admin/pasivos`, { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const tbody = document.getElementById('listaPasivos');
                tbody.innerHTML = data.map(u => `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="flex items-center opacity-75">
                                <div class="h-10 w-10 rounded-full bg-slate-200 text-slate-500 flex items-center justify-center font-bold mr-3">
                                    ${u.nombre.charAt(0)}
                                </div>
                                <div>
                                    <p class="font-bold text-slate-700 uppercase italic text-sm">${u.nombre}</p>
                                    <p class="text-xs text-slate-400 font-medium">${u.cedula}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="verExpediente(${u.id}, '${u.nombre}', 'pasivos')" class="bg-slate-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-slate-700 transition shadow-sm">
                                <i class="fas fa-folder-open mr-2"></i> Expediente
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        // LÓGICA PARA VER EL EXPEDIENTE
        async function verExpediente(usuarioId, nombre, tipo) {
            const modal = document.getElementById('modalExpediente');
            const titulo = document.getElementById('tituloExpediente');
            const contenedor = document.getElementById('contenidoExpediente');

            titulo.innerText = nombre;
            contenedor.innerHTML = '<div class="col-span-full text-center py-10"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i><p class="mt-2 text-slate-500 font-bold text-xs uppercase">Cargando Archivos...</p></div>';
            modal.classList.remove('hidden');

            try {
                // Se usa el endpoint de admin que ya consulta los documentos por ID de usuario
                const endpoint = tipo === 'activos' ? `${API_BASE}/admin/expediente/${usuarioId}` : `${API_BASE}/admin/expediente-pasivo/${usuarioId}`;
                
                const res = await fetch(endpoint, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const docs = await res.json();

                if (!docs || docs.length === 0) {
                    contenedor.innerHTML = `
                        <div class="col-span-full text-center py-12 bg-white rounded-xl border-2 border-dashed border-slate-200">
                            <i class="fas fa-folder-open text-slate-200 text-5xl mb-3"></i>
                            <p class="text-slate-500 font-bold uppercase text-xs">No hay documentos registrados</p>
                        </div>`;
                    return;
                }

                contenedor.innerHTML = docs.map(doc => `
                    <div class="folder-card bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm hover:shadow-md transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="h-12 w-12 rounded-lg bg-red-50 text-red-500 flex items-center justify-center text-2xl group-hover:bg-red-500 group-hover:text-white transition-colors">
                                <i class="fas fa-file-pdf"></i>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">${doc.tipo_documento}</p>
                                <p class="text-xs text-slate-400 font-bold">${new Date(doc.created_at).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <a href="${doc.url_cloudinary}" target="_blank" class="h-10 w-10 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:bg-blue-600 hover:text-white transition-all shadow-inner">
                            <i class="fas fa-eye"></i>
                        </a>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Error:", error);
                contenedor.innerHTML = '<p class="col-span-full text-center text-red-500 font-bold">Error al conectar con el servidor.</p>';
            }
        }

        function cerrarExpediente() {
            document.getElementById('modalExpediente').classList.add('hidden');
        }

        // Carga inicial
        window.onload = cargarActivos;
    </script>
</body>
</html>
